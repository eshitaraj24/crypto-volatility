name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install black ruff pytest httpx fastapi uvicorn xgboost numpy pandas pyarrow scikit-learn

      - name: Run Black formatter check
        run: black --check api/ features/ models/ scripts/

      - name: Run Ruff linter
        run: ruff check api/ features/ models/ scripts/

      - name: Run integration tests
        run: pytest tests/ -v
